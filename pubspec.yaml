name: learn_hub
description: "LearnHub - A production-ready Flutter learning platform with course booking, online classes, and payment integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  flutter_screenutil: ^5.9.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Serialization & Code Generation
  freezed_annotation: any
  json_annotation: any


  # Network & API
  dio: ^5.3.0
  supabase_flutter: ^1.10.0
  supabase: ^1.10.0

  # Authentication
  google_sign_in: ^6.2.0
  supabase_auth_ui: ^0.1.0

  # # Firebase
  # firebase_core: any
  # firebase_messaging: any
  # firebase_analytics: any

  # Video & Media
  video_player: ^2.8.0
  chewie: ^1.8.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0
  url_launcher: ^6.2.5

  # Utils & Helpers
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.0
  get_it: ^7.6.0
  logger: ^2.0.0
  toastification: ^1.0.0
  uuid: ^4.0.0

  # Calendar & Date
  table_calendar: ^3.0.0
  infinite_scroll_pagination: ^4.0.0

  # UI Components
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  dotted_border: ^2.1.0
  percent_indicator: ^4.1.0

  # Payment
  razorpay_flutter: ^1.3.0
  firebase_core: ^4.9.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: any
  freezed: any
  json_serializable: any

flutter:
  uses-material-design: true

